      - text: "Applications"
        menu:
          - text: "Vine Copulas: Overview & Slides"
            href: materials/03-vine-copulas/index.qmd
          - text: "Notebook 1: Bivariate Copulas"
            href: materials/03-vine-copulas/bivariatecopulas.ipynb
          - text: "Notebook 2: Vine Copulas"
